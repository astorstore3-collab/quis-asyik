<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Pembelajaran Interaktif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .option-btn:hover {
            border-color: #667eea;
            background-color: #f8fafc;
            transform: translateY(-2px);
        }

        .option-btn.correct {
            background-color: #def7ec;
            border-color: #31c48d;
            color: #03543f;
        }

        .option-btn.wrong {
            background-color: #fde8e8;
            border-color: #f98080;
            color: #9b1c1c;
        }

        .progress-bar {
            height: 8px;
            background-color: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #667eea, #764ba2);
            width: 0%;
            transition: width 0.4s ease;
        }

        #result-screen {
            display: none;
            text-align: center;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="glass-card" id="quiz-container">
        <!-- Start Screen -->
        <div id="start-screen" class="text-center">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">Uji Pengetahuanmu!</h1>
            <p class="text-gray-600 mb-8">Selamat datang di kuis pembelajaran. 10 pertanyaan dari berbagai mata pelajaran menantimu!</p>
            <button onclick="startQuiz()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition transform hover:scale-105">
                Mulai Kuis
            </button>
        </div>

        <!-- Quiz Content -->
        <div id="quiz-content" class="hidden">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold text-gray-500" id="question-counter">Pertanyaan 1/10</span>
                <span class="text-sm font-semibold text-indigo-600" id="score-display">Skor: 0</span>
            </div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>

            <h2 id="question-text" class="text-xl font-semibold text-gray-800 mb-6">Memuat pertanyaan...</h2>
            
            <div id="options-container">
                <!-- Pilihan jawaban akan muncul di sini -->
            </div>

            <div id="feedback" class="mt-4 text-center font-medium min-h-[1.5rem]"></div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen">
            <h2 class="text-3xl font-bold text-gray-800 mb-2">Kuis Selesai!</h2>
            <div id="final-score-circle" class="w-32 h-32 rounded-full border-8 border-indigo-600 flex items-center justify-center mx-auto my-6">
                <span class="text-2xl font-bold text-indigo-700" id="final-score-text">0%</span>
            </div>
            <p class="text-gray-600 mb-2 font-bold" id="score-count-text"></p>
            <p class="text-gray-600 mb-8" id="result-message">Hebat! Kamu telah menyelesaikan kuis ini.</p>
            <button onclick="restartQuiz()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transition">
                Coba Lagi
            </button>
        </div>
    </div>

    <script>
        // Data Pertanyaan (10 Soal Beragam)
        const quizData = [
            {
                question: "[IPA] Apa planet terbesar di tata surya kita?",
                options: ["Saturnus", "Jupiter", "Neptunus", "Uranus"],
                correct: 1
            },
            {
                question: "[Sejarah] Siapa presiden pertama Amerika Serikat?",
                options: ["Abraham Lincoln", "Thomas Jefferson", "George Washington", "John F. Kennedy"],
                correct: 2
            },
            {
                question: "[Matematika] Berapa akar kuadrat dari 64?",
                options: ["6", "7", "8", "9"],
                correct: 2
            },
            {
                question: "[Biologi] Apa organ tubuh manusia yang berfungsi memompa darah?",
                options: ["Paru-paru", "Hati", "Ginjal", "Jantung"],
                correct: 3
            },
            {
                question: "[Geografi] Benua terkecil di dunia adalah...",
                options: ["Eropa", "Australia", "Antartika", "Amerika Selatan"],
                correct: 1
            },
            {
                question: "[Seni] Siapa pelukis mahakarya 'Mona Lisa'?",
                options: ["Vincent van Gogh", "Pablo Picasso", "Leonardo da Vinci", "Claude Monet"],
                correct: 2
            },
            {
                question: "[Bahasa] Kata 'Bhinneka' dalam semboyan Indonesia berarti...",
                options: ["Satu", "Berbeda-beda", "Bersatu", "Kuat"],
                correct: 1
            },
            {
                question: "[Fisika] Satuan untuk mengukur arus listrik adalah...",
                options: ["Volt", "Watt", "Ohm", "Ampere"],
                correct: 3
            },
            {
                question: "[Kimia] Apa simbol kimia untuk Emas?",
                options: ["Ag", "Fe", "Au", "Pb"],
                correct: 2
            },
            {
                question: "[Umum] Di negara manakah Menara Eiffel berada?",
                options: ["Italia", "Prancis", "Jerman", "Spanyol"],
                correct: 1
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let canAnswer = true;

        const startScreen = document.getElementById('start-screen');
        const quizContent = document.getElementById('quiz-content');
        const resultScreen = document.getElementById('result-screen');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        const feedbackText = document.getElementById('feedback');
        const progressFill = document.getElementById('progress-fill');
        const questionCounter = document.getElementById('question-counter');
        const scoreDisplay = document.getElementById('score-display');

        function startQuiz() {
            startScreen.classList.add('hidden');
            quizContent.classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            canAnswer = true;
            feedbackText.innerText = '';
            const q = quizData[currentQuestion];
            
            // Update UI
            questionText.innerText = q.question;
            questionCounter.innerText = `Pertanyaan ${currentQuestion + 1}/${quizData.length}`;
            progressFill.style.width = `${((currentQuestion) / quizData.length) * 100}%`;
            
            // Clear and Load Options
            optionsContainer.innerHTML = '';
            q.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.innerText = option;
                button.classList.add('option-btn');
                button.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(button);
            });
        }

        function checkAnswer(selectedIndex) {
            if (!canAnswer) return;
            canAnswer = false;

            const correctIndex = quizData[currentQuestion].correct;
            const buttons = optionsContainer.getElementsByClassName('option-btn');

            if (selectedIndex === correctIndex) {
                score++;
                buttons[selectedIndex].classList.add('correct');
                feedbackText.innerText = "Benar! Bagus sekali.";
                feedbackText.style.color = "#057a55";
            } else {
                buttons[selectedIndex].classList.add('wrong');
                buttons[correctIndex].classList.add('correct');
                feedbackText.innerText = "Kurang tepat, jawaban yang benar telah ditandai.";
                feedbackText.style.color = "#c81e1e";
            }

            scoreDisplay.innerText = `Skor: ${score}`;

            // Wait then next question
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < quizData.length) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }, 1200);
        }

        function showResults() {
            quizContent.classList.add('hidden');
            resultScreen.style.display = 'block';
            
            const percentage = Math.round((score / quizData.length) * 100);
            document.getElementById('final-score-text').innerText = `${percentage}%`;
            document.getElementById('score-count-text').innerText = `Kamu menjawab benar ${score} dari ${quizData.length} soal.`;
            progressFill.style.width = '100%';

            let msg = "";
            if (percentage === 100) msg = "Sempurna! Kamu adalah seorang jenius!";
            else if (percentage >= 80) msg = "Luar biasa! Pengetahuanmu sangat luas.";
            else if (percentage >= 60) msg = "Cukup baik! Tingkatkan lagi belajarmu.";
            else msg = "Jangan menyerah, ayo belajar lagi dan coba ulangi kuisnya!";
            
            document.getElementById('result-message').innerText = msg;
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            scoreDisplay.innerText = "Skor: 0";
            resultScreen.style.display = 'none';
            startScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
